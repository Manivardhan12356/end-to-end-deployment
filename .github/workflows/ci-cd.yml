name: Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main # Trigger the pipeline when code is pushed to the main branch

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy to DigitalOcean Kubernetes
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the latest code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Log into Docker Hub (The Image Registry)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Step 3: Build and Push the Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          # We tag it with the unique GitHub commit hash so we can track exactly which code is running
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/human-backend:${{ github.sha }}, ${{ secrets.DOCKER_HUB_USERNAME }}/human-backend:latest

      # Step 4: Build and Push the Frontend Image
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/human-frontend:${{ github.sha }}, ${{ secrets.DOCKER_HUB_USERNAME }}/human-frontend:latest

      # Step 5: Connect to DigitalOcean Kubernetes (DOKS)
      - name: Install DigitalOcean CLI (doctl)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DO_CLUSTER_NAME }}
 
      # Step 6: Deploy the new images to the DOKS Cluster
      - name: Deploy to Kubernetes
        run: |
          # Update the YAML files to use the brand new images we just built
          sed -i "s|human-backend:.*|${{ secrets.DOCKER_HUB_USERNAME }}/human-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|human-frontend:.*|${{ secrets.DOCKER_HUB_USERNAME }}/human-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          
          # Send the YAML files to the DigitalOcean cluster
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          
          # Wait for Kubernetes to safely roll out the new pods
          kubectl rollout status deployment/backend-deployment
          kubectl rollout status deployment/frontend-deployment
